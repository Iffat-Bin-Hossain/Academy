version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15
    container_name: academy_db
    environment:
      POSTGRES_DB: academydb
      POSTGRES_USER: academyuser
      POSTGRES_PASSWORD: academy123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - academy_network
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academy_backend
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=240000
      - SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME=30000
      - SERVER_PORT=8081
      - UPLOAD_DIR=/app/data/uploads
    ports:
      - "8081:8081"
    volumes:
      - academy_uploads:/app/data/uploads
    depends_on:
      - db
    networks:
      - academy_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academy_frontend
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8081
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - academy_network
    restart: unless-stopped

volumes:
  academy_uploads:
  postgres_data:

networks:
  academy_network:
    driver: bridge